<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111210;
            --surface: #181917;
            --surface-hover: #1e1f1c;
            --text: #e8e4db;
            --text-secondary: #b5b0a4;
            --text-muted: #7a7670;
            --amber: #c9a84c;
            --amber-dim: #a88b3a;
            --olive: #7d8a5e;
            --slate: #6b7d8a;
            --rust: #b8956a;
            --border: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.05);
            --max-width: 680px;
            --font-display: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            --font-body: 'Source Serif 4', 'Georgia', 'Times New Roman', serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', monospace;
            --radius: 3px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.65;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem 4rem;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        ::selection {
            background: rgba(201, 168, 76, 0.25);
            color: var(--text);
        }

        .main-column {
            width: 100%;
            max-width: var(--max-width);
            display: flex;
            flex-direction: column;
            gap: 2.25rem;
        }

        /* ── MASTHEAD ── */
        .masthead {
            display: flex;
            flex-direction: column;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .masthead-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .greeting {
            font-family: var(--font-display);
            font-size: 2.6rem;
            font-style: italic;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.01em;
            line-height: 1.1;
        }
        .clock {
            font-family: var(--font-mono);
            font-size: 2.4rem;
            font-weight: 400;
            color: var(--amber);
            letter-spacing: 0.04em;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .date-full {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
            letter-spacing: 0.01em;
        }

        /* ── SECTION LABELS ── */
        .section-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            padding-top: 0.6rem;
            border-top: 1px solid var(--border-light);
            margin-bottom: 0.85rem;
        }

        /* ── 2000-DAY TRACKER ── */
        .macro-tracker {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .macro-tracker .tracker-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .macro-tracker .tracker-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }
        .macro-tracker .tracker-count {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--amber);
            font-weight: 500;
            letter-spacing: 0.03em;
        }
        .progress-bar-outer {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-inner {
            height: 100%;
            background: var(--amber);
            border-radius: 2px;
            transition: width 400ms ease;
            min-width: 0;
        }

        /* ── TODAY'S FOCUS ── */
        .focus-block {
            position: relative;
            border-left: 2px solid var(--amber);
            padding: 0.65rem 0 0.65rem 1.1rem;
            margin-left: 0;
            border-radius: 0 var(--radius) var(--radius) 0;
            transition: border-color 200ms ease;
        }
        .focus-block:focus-within {
            border-left-color: var(--amber-dim);
        }
        .focus-editable {
            font-family: var(--font-body);
            font-size: 1.2rem;
            font-style: italic;
            color: var(--text);
            outline: none;
            cursor: text;
            line-height: 1.5;
            min-height: 1.5em;
            word-break: break-word;
        }
        .focus-editable:empty::before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            font-style: italic;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ── CONTINUE FROM ── */
        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .project-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1rem 1.1rem 0.9rem;
            transition: border-color 200ms ease, background 200ms ease;
        }
        .project-card:hover {
            border-color: rgba(255, 255, 255, 0.14);
            background: var(--surface-hover);
        }
        .project-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
        }
        .project-card .project-name {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            cursor: text;
            flex: 1;
            min-width: 0;
            border-bottom: 1px solid transparent;
            transition: border-color 200ms ease;
            padding-bottom: 1px;
        }
        .project-card .project-name:focus {
            border-bottom: 1px solid var(--amber-dim);
        }
        .project-card .project-name:empty::before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            font-weight: 400;
            pointer-events: none;
        }
        .project-card .delete-btn {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            transition: opacity 150ms ease, color 150ms ease;
            background: none;
            border: none;
            padding: 2px 6px;
            border-radius: 3px;
            line-height: 1;
            flex-shrink: 0;
        }
        .project-card:hover .delete-btn {
            opacity: 1;
        }
        .project-card .delete-btn:hover {
            color: #c96b6b;
            background: rgba(201, 107, 107, 0.1);
        }
        .project-card .delete-btn.hidden-delete {
            opacity: 0;
            pointer-events: none;
        }
        .project-card .continue-field {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--text-secondary);
            outline: none;
            cursor: text;
            line-height: 1.55;
            min-height: 3.8em;
            border-left: 2px solid var(--amber);
            padding: 0.4rem 0 0.4rem 0.9rem;
            margin: 0.3rem 0 0.45rem;
            border-radius: 0 var(--radius) var(--radius) 0;
            transition: border-color 200ms ease;
            word-break: break-word;
        }
        .project-card .continue-field:focus {
            border-left-color: var(--amber-dim);
        }
        .project-card .continue-field:empty::before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            pointer-events: none;
            font-style: italic;
        }
        .project-card .card-footer {
            display: flex;
            justify-content: flex-end;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-top: 0.15rem;
        }
        .add-project-btn {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            background: none;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 200ms ease;
            text-align: center;
            width: 100%;
        }
        .add-project-btn:hover {
            color: var(--amber);
            border-color: rgba(201, 168, 76, 0.4);
            background: rgba(201, 168, 76, 0.04);
        }
        .add-project-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ── READING LIST ── */
        .reading-category {
            margin-bottom: 1.3rem;
        }
        .reading-category .cat-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.45rem;
        }
        .reading-category .cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cat-dot.cat-ai {
            background: #7a8b9e;
        }
        .cat-dot.cat-finance {
            background: #8a9a5b;
        }
        .cat-dot.cat-geo {
            background: #b8956a;
        }
        .cat-dot.cat-india {
            background: #c9a84c;
        }
        .reading-category .cat-name {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .reading-category .cat-budget {
            font-family: var(--font-mono);
            font-size: 0.62rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-left: auto;
        }
        .source-row {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.4rem 0.5rem 0.4rem 0.3rem;
            border-radius: 3px;
            cursor: pointer;
            transition: background 150ms ease, transform 150ms ease;
            text-decoration: none;
            color: inherit;
            position: relative;
        }
        .source-row:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }
        .source-row .src-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            opacity: 0.7;
        }
        .src-dot.sd-ai {
            background: #7a8b9e;
        }
        .src-dot.sd-finance {
            background: #8a9a5b;
        }
        .src-dot.sd-geo {
            background: #b8956a;
        }
        .src-dot.sd-india {
            background: #c9a84c;
        }
        .source-row .src-name {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text);
            flex: 1;
            transition: color 150ms ease;
        }
        .source-row .src-arrow {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 150ms ease;
            flex-shrink: 0;
        }
        .source-row:hover .src-arrow {
            opacity: 1;
        }
        .source-row .read-check {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 150ms ease;
            background: transparent;
            font-size: 9px;
            color: transparent;
        }
        .source-row .read-check:hover {
            border-color: var(--amber);
            background: rgba(201, 168, 76, 0.08);
        }
        .source-row.read .read-check {
            border-color: var(--amber);
            background: rgba(201, 168, 76, 0.2);
            color: var(--amber);
        }
        .source-row.read .src-name {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .source-row.read .src-dot {
            opacity: 0.3;
        }
        .reading-summary {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-align: right;
            padding-top: 0.3rem;
            border-top: 1px solid var(--border-light);
            margin-top: 0.2rem;
        }

        /* ── QUOTE ── */
        .quote-section {
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .quote-text {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-style: italic;
            font-weight: 400;
            color: var(--text);
            line-height: 1.55;
            text-align: center;
            padding: 0 0.5rem;
        }
        .quote-attribution {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: right;
            letter-spacing: 0.05em;
            margin-top: 0.6rem;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 500px) {
            body {
                padding: 1.25rem 0.9rem 3rem;
            }
            .greeting {
                font-size: 1.9rem;
            }
            .clock {
                font-size: 1.6rem;
            }
            .focus-editable {
                font-size: 1.05rem;
            }
            .quote-text {
                font-size: 1.15rem;
            }
            .project-card {
                padding: 0.75rem 0.85rem 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-column">
        <!-- MASTHEAD -->
        <header class="masthead">
            <div class="masthead-row">
                <span class="greeting" id="greeting">Good morning.</span>
                <span class="clock" id="clock">00:00:00</span>
            </div>
            <div class="date-full" id="dateFull">Sunday, 7 June 2026</div>
        </header>

        <!-- 2000-DAY MACRO TRACKER -->
        <section class="macro-tracker" aria-label="2000-day macro tracker">
            <div class="section-label">MACRO TRACKER</div>
            <div class="tracker-info">
                <span class="tracker-label">2000-Day Chain</span>
                <span class="tracker-count" id="trackerCount">Day 0 / 2000</span>
            </div>
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar" style="width: 0%;"></div>
            </div>
        </section>

        <!-- TODAY'S FOCUS -->
        <section aria-label="Today's focus">
            <div class="section-label">TODAY'S FOCUS</div>
            <div class="focus-block">
                <div class="focus-editable" id="focusEditable" contenteditable="true"
                data-placeholder="Today's focus — what matters today?"></div>
            </div>
        </section>

        <!-- CONTINUE FROM -->
        <section aria-label="Continue from">
            <div class="section-label">CONTINUE FROM</div>
            <div class="projects-list" id="projectsList"></div>
            <button class="add-project-btn" id="addProjectBtn" title="Add a new project (max 6)">+ Add Project</button>
        </section>

        <!-- READING LIST -->
        <section aria-label="Reading list">
            <div class="section-label">READING LIST</div>
            <div id="readingListContainer"></div>
            <div class="reading-summary">Total reading time: 90 min</div>
        </section>

        <!-- QUOTE -->
        <footer class="quote-section" aria-label="Daily quote">
            <p class="quote-text" id="quoteText"></p>
            <p class="quote-attribution" id="quoteAttr"></p>
        </footer>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // CONFIGURATION — Edit START_DATE as needed
            // ──────────────────────────────────────
            const START_DATE = new Date(2026, 5, 7); // June 7, 2026 (Month is 0-indexed)
            const TOTAL_DAYS = 2000;

            // ──────────────────────────────────────
            // DOM REFS
            // ──────────────────────────────────────
            const greetingEl = document.getElementById('greeting');
            const clockEl = document.getElementById('clock');
            const dateFullEl = document.getElementById('dateFull');
            const trackerCountEl = document.getElementById('trackerCount');
            const progressBar = document.getElementById('progressBar');
            const focusEditable = document.getElementById('focusEditable');
            const projectsListEl = document.getElementById('projectsList');
            const addProjectBtn = document.getElementById('addProjectBtn');
            const readingListContainer = document.getElementById('readingListContainer');
            const quoteTextEl = document.getElementById('quoteText');
            const quoteAttrEl = document.getElementById('quoteAttr');

            // ──────────────────────────────────────
            // UTILITY FUNCTIONS
            // ──────────────────────────────────────
            function getTodayDateStr() {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function getNowTimestamp() {
                const now = new Date();
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const h = now.getHours();
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ampm = h >= 12 ? 'PM' : 'AM';
                const h12 = h % 12 || 12;
                const day = now.getDate();
                const mon = months[now.getMonth()];
                return `${h12}:${mm} ${ampm}, ${day} ${mon}`;
            }

            function getDaysElapsed() {
                const today = new Date();
                const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                const startStart = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
                const diffMs = todayStart - startStart;
                const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                return Math.max(0, days);
            }

            function formatFullDate() {
                const now = new Date();
                const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September',
                    'October', 'November', 'December'
                ];
                const dayName = dayNames[now.getDay()];
                const day = now.getDate();
                const monthName = monthNames[now.getMonth()];
                const year = now.getFullYear();
                return `${dayName}, ${day} ${monthName} ${year}`;
            }

            function getGreeting() {
                const h = new Date().getHours();
                if (h < 12) return 'Good morning.';
                if (h < 17) return 'Good afternoon.';
                return 'Good evening.';
            }

            function generateId() {
                return 'proj_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            }

            // ──────────────────────────────────────
            // CLOCK
            // ──────────────────────────────────────
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                clockEl.textContent = `${h}:${m}:${s}`;
            }

            function updateMasthead() {
                greetingEl.textContent = getGreeting();
                dateFullEl.textContent = formatFullDate();
                updateClock();
            }

            // ──────────────────────────────────────
            // 2000-DAY TRACKER
            // ──────────────────────────────────────
            function updateTracker() {
                const elapsed = getDaysElapsed();
                const displayDay = elapsed + 1; // Day 1 on start date
                const cappedDay = Math.min(displayDay, TOTAL_DAYS);
                const pct = Math.min((cappedDay / TOTAL_DAYS) * 100, 100);
                trackerCountEl.textContent = `Day ${cappedDay} / ${TOTAL_DAYS}`;
                progressBar.style.width = pct.toFixed(4) + '%';
            }

            // ──────────────────────────────────────
            // TODAY'S FOCUS
            // ──────────────────────────────────────
            function getFocusKey() {
                return 'focus_' + getTodayDateStr();
            }

            function loadFocus() {
                const key = getFocusKey();
                const saved = localStorage.getItem(key);
                if (saved !== null) {
                    focusEditable.textContent = saved;
                } else {
                    focusEditable.textContent = '';
                }
            }

            function saveFocus() {
                const key = getFocusKey();
                const content = focusEditable.textContent.trim();
                if (content === '') {
                    localStorage.removeItem(key);
                } else {
                    localStorage.setItem(key, content);
                }
            }

            focusEditable.addEventListener('blur', saveFocus);
            focusEditable.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    focusEditable.blur();
                }
            });

            // ──────────────────────────────────────
            // CONTINUE FROM — PROJECTS
            // ──────────────────────────────────────
            const PROJECTS_KEY = 'continue_projects';
            const MAX_PROJECTS = 6;
            const MIN_PROJECTS = 1;

            function getProjects() {
                try {
                    const raw = localStorage.getItem(PROJECTS_KEY);
                    if (raw) {
                        const arr = JSON.parse(raw);
                        if (Array.isArray(arr) && arr.length >= MIN_PROJECTS) {
                            return arr.filter(p => p && typeof p.id === 'string' && typeof p.name === 'string' &&
                                typeof p.continueFrom === 'string');
                        }
                    }
                } catch (e) { /* fall through */ }
                // Default: one empty project
                return [{
                    id: generateId(),
                    name: '',
                    continueFrom: '',
                    lastUpdated: ''
                }];
            }

            function saveProjects(projects) {
                // Ensure at least MIN_PROJECTS
                let valid = projects.filter(p => p && typeof p.id === 'string');
                if (valid.length < MIN_PROJECTS) {
                    valid = [{
                        id: generateId(),
                        name: '',
                        continueFrom: '',
                        lastUpdated: ''
                    }];
                }
                if (valid.length > MAX_PROJECTS) {
                    valid = valid.slice(0, MAX_PROJECTS);
                }
                localStorage.setItem(PROJECTS_KEY, JSON.stringify(valid));
                return valid;
            }

            function updateProjectTimestamp(projects, projectId) {
                const ts = getNowTimestamp();
                return projects.map(p => {
                    if (p.id === projectId) {
                        return { ...p, lastUpdated: ts };
                    }
                    return p;
                });
            }

            function renderProjects(projects) {
                projectsListEl.innerHTML = '';
                projects.forEach((proj, index) => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.dataset.projectId = proj.id;
                    card.innerHTML = `
                <div class="card-header">
                  <div class="project-name" contenteditable="true"
                       data-placeholder="Project name…">${escapeHTML(proj.name)}</div>
                  <button class="delete-btn${projects.length <= MIN_PROJECTS ? ' hidden-delete' : ''}"
                          title="Delete project">×</button>
                </div>
                <div class="continue-field" contenteditable="true"
                     data-placeholder="Where you stopped and what to do next…">${escapeHTML(proj.continueFrom)}</div>
                <div class="card-footer">${proj.lastUpdated ? 'Last updated: ' + escapeHTML(proj.lastUpdated) : ''}</div>
              `;
                    projectsListEl.appendChild(card);
                });

                // Wire up events
                const cards = projectsListEl.querySelectorAll('.project-card');
                cards.forEach(card => {
                    const pid = card.dataset.projectId;
                    const nameEl = card.querySelector('.project-name');
                    const continueEl = card.querySelector('.continue-field');
                    const deleteBtn = card.querySelector('.delete-btn');
                    const footerEl = card.querySelector('.card-footer');

                    const handleChange = () => {
                        let allProjects = getProjects();
                        const idx = allProjects.findIndex(p => p.id === pid);
                        if (idx >= 0) {
                            allProjects[idx].name = nameEl.textContent.trim();
                            allProjects[idx].continueFrom = continueEl.textContent.trim();
                            allProjects = updateProjectTimestamp(allProjects, pid);
                            allProjects = saveProjects(allProjects);
                            // Update footer without full re-render
                            const updated = allProjects.find(p => p.id === pid);
                            if (updated && footerEl) {
                                footerEl.textContent = updated.lastUpdated ? 'Last updated: ' + updated
                                    .lastUpdated : '';
                            }
                            // Update delete button visibility
                            updateDeleteButtons(allProjects);
                        }
                    };

                    nameEl.addEventListener('blur', handleChange);
                    continueEl.addEventListener('blur', handleChange);
                    // Also save on input for auto-timestamp update feel
                    let inputTimeout;
                    const debouncedHandle = () => {
                        clearTimeout(inputTimeout);
                        inputTimeout = setTimeout(handleChange, 600);
                    };
                    nameEl.addEventListener('input', debouncedHandle);
                    continueEl.addEventListener('input', debouncedHandle);

                    if (deleteBtn && !deleteBtn.classList.contains('hidden-delete')) {
                        deleteBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            let allProjects = getProjects();
                            if (allProjects.length <= MIN_PROJECTS) return;
                            allProjects = allProjects.filter(p => p.id !== pid);
                            allProjects = saveProjects(allProjects);
                            renderProjects(allProjects);
                            updateAddButtonState(allProjects);
                        });
                    }
                });

                updateAddButtonState(projects);
            }

            function updateDeleteButtons(projects) {
                const cards = projectsListEl.querySelectorAll('.project-card');
                cards.forEach(card => {
                    const deleteBtn = card.querySelector('.delete-btn');
                    if (deleteBtn) {
                        if (projects.length <= MIN_PROJECTS) {
                            deleteBtn.classList.add('hidden-delete');
                        } else {
                            deleteBtn.classList.remove('hidden-delete');
                        }
                    }
                });
            }

            function updateAddButtonState(projects) {
                if (projects.length >= MAX_PROJECTS) {
                    addProjectBtn.disabled = true;
                    addProjectBtn.textContent = 'Max 6 Projects';
                } else {
                    addProjectBtn.disabled = false;
                    addProjectBtn.textContent = '+ Add Project';
                }
            }

            addProjectBtn.addEventListener('click', () => {
                let projects = getProjects();
                if (projects.length >= MAX_PROJECTS) return;
                const newProj = {
                    id: generateId(),
                    name: '',
                    continueFrom: '',
                    lastUpdated: ''
                };
                projects.push(newProj);
                projects = saveProjects(projects);
                renderProjects(projects);
            });

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getReadKey() {
                return 'reading_read_' + getTodayDateStr();
            }

            function getReadSet() {
                const key = getReadKey();
                try {
                    const raw = localStorage.getItem(key);
                    if (raw) {
                        const arr = JSON.parse(raw);
                        if (Array.isArray(arr)) return new Set(arr);
                    }
                } catch (e) { /* fall through */ }
                return new Set();
            }

            function saveReadSet(readSet) {
                const key = getReadKey();
                localStorage.setItem(key, JSON.stringify([...readSet]));
            }

            function cleanOldReadKeys() {
                const today = getTodayDateStr();
                const prefix = 'reading_read_';
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith(prefix) && key !== prefix + today) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(k => localStorage.removeItem(k));
            }

            function renderReadingList() {
                cleanOldReadKeys();
                const readSet = getReadSet();
                readingListContainer.innerHTML = '';

                READING_CATEGORIES.forEach(cat => {
                    const catDiv = document.createElement('div');
                    catDiv.className = 'reading-category';
                    catDiv.innerHTML = `
                <div class="cat-header">
                  <span class="cat-dot ${cat.dotClass}"></span>
                  <span class="cat-name">${cat.label}</span>
                  <span class="cat-budget">${cat.budget}</span>
                </div>
              `;

                    cat.sources.forEach(src => {
                        const isRead = readSet.has(src.id);
                        const row = document.createElement('a');
                        row.className = 'source-row' + (isRead ? ' read' : '');
                        row.href = src.url;
                        row.target = '_blank';
                        row.rel = 'noopener noreferrer';
                        row.dataset.sourceId = src.id;
                        row.innerHTML = `
                  <span class="src-dot ${cat.sdClass}"></span>
                  <span class="src-name">${src.name}</span>
                  <span class="read-check">✓</span>
                  <span class="src-arrow">→</span>
                `;

                        // Checkbox click
                        const checkEl = row.querySelector('.read-check');
                        checkEl.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            const currentReadSet = getReadSet();
                            if (currentReadSet.has(src.id)) {
                                currentReadSet.delete(src.id);
                            } else {
                                currentReadSet.add(src.id);
                            }
                            saveReadSet(currentReadSet);
                            renderReadingList();
                        });

                        catDiv.appendChild(row);
                    });

                    readingListContainer.appendChild(catDiv);
                });
            }

            function pickRandomQuote() {
                const idx = Math.floor(Math.random() * QUOTES.length);
                return QUOTES[idx];
            }

            function renderQuote() {
                const quote = pickRandomQuote();
                quoteTextEl.textContent = '“' + quote.text + '”';
                quoteAttrEl.textContent = '— ' + quote.attr;
            }

            // ──────────────────────────────────────
            // INITIALIZATION
            // ──────────────────────────────────────
            function init() {
                updateMasthead();
                updateTracker();
                loadFocus();
                const projects = getProjects();
                const saved = saveProjects(projects);
                renderProjects(saved);
                renderReadingList();
                renderQuote();
            }

            // ──────────────────────────────────────
            // PERIODIC UPDATES
            // ──────────────────────────────────────
            setInterval(() => {
                updateClock();
                // Check if date changed (midnight rollover)
                const currentDateStr = getTodayDateStr();
                if (currentDateStr !== lastKnownDate) {
                    lastKnownDate = currentDateStr;
                    updateMasthead();
                    updateTracker();
                    loadFocus();
                    renderReadingList();
                }
            }, 1000);

            let lastKnownDate = getTodayDateStr();

            // ──────────────────────────────────────
            // HANDLE STORAGE EVENTS (cross-tab sync)
            // ──────────────────────────────────────
            window.addEventListener('storage', function(e) {
                if (e.key === PROJECTS_KEY) {
                    const projects = getProjects();
                    renderProjects(saveProjects(projects));
                }
                if (e.key && e.key.startsWith('focus_')) {
                    loadFocus();
                }
                if (e.key && e.key.startsWith('reading_read_')) {
                    renderReadingList();
                }
            });

            // ──────────────────────────────────────
            // START
            // ──────────────────────────────────────
            init();
        })();
    </script>
